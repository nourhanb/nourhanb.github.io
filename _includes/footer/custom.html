<script>
(function() {
  var trigger = document.getElementById('bio-more-trigger');
  var content = document.getElementById('bio-more-content');
  if (!trigger || !content) return;
  trigger.addEventListener('click', function() {
    var isHidden = content.hidden;
    content.hidden = !isHidden;
    trigger.setAttribute('aria-expanded', isHidden);
    trigger.textContent = isHidden ? '▲ Less' : '▼ More about me';
  });
  trigger.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger.click(); }
  });
})();
</script>
<!-- end custom footer snippets -->
